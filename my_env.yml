name: ConstLLM
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch
  - pytorch-cuda=12.1  # Changed from 12.4 to match your CUDA 12.0
  - torchvision
  - torchaudio
  - transformers
  - datasets
  - accelerate
  - captum
  - trl
  - peft
  - numpy
  - pandas
  - scikit-learn
  - matplotlib
  - tqdm
  - jupyter
  - pip
  - pip:
    - bitsandbytes
    - wandb
    - unsloth